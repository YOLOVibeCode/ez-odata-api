name: CI

# Build + test on every push/PR.
# On a v* tag: publish NuGet to GitHub Packages AND publish npm package.
# On a js-v* tag: publish npm package only (JS-only patch releases).
on:
  push:
    branches: [main]
    tags: ["v*", "js-v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  dotnet-check:
    name: .NET build & tests
    # Skip on js-v* tags — only JS is being released in that case.
    if: "!startsWith(github.ref, 'refs/tags/js-v')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore EzOdata.slnx
      - run: dotnet build EzOdata.slnx -c Release --no-restore
      - name: Unit tests
        run: dotnet test tests/EzOdata.UnitTests -c Release --no-build
      # GitHub-hosted ubuntu runners include Docker, so Testcontainers
      # (PostgreSQL / MySQL) runs without any extra service config.
      - name: Integration tests
        run: dotnet test tests/EzOdata.IntegrationTests -c Release --no-build
      - name: Conformance + security suite
        run: dotnet test tests/EzOdata.ConformanceTests -c Release --no-build

  js-check:
    name: Typecheck, lint, depcruise, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: js/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: Run checks (typecheck + lint + depcruise + tests)
        working-directory: js
        run: pnpm check
        env:
          # Testcontainers pulls container images from Docker Hub on first run.
          # Tests run sequentially (singleThread:true in vitest.config.ts) to prevent
          # concurrent container startup from causing resource contention.
          TESTCONTAINERS_RYUK_DISABLED: "false"

  publish-nuget:
    name: Pack & publish NuGet to GitHub Packages
    needs: dotnet-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Extract version from tag
        id: version
        # GITHUB_REF_NAME is "v1.2.3"; strip the leading "v".
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Pack embeddable packages
        run: dotnet pack EzOdata.slnx -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.VERSION }}
      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.repository_owner }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --source github \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg

  publish-npm:
    name: Build and publish to npm
    needs: js-check
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/js-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: js/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: Extract version from tag
        id: version
        # Strip "js-v" first (js-v1.2.3 → 1.2.3), then strip plain "v" (v1.2.3 → 1.2.3).
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#js-v}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Set package version
        working-directory: js
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
      - name: Build
        working-directory: js
        run: pnpm build
      - name: Publish to npm
        working-directory: js
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
