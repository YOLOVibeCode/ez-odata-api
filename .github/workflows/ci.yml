name: ci

# Build + test on every push/PR; pack and publish the embeddable NuGet packages to
# GitHub Packages on pushes to main and on version tags (idempotent via --skip-duplicate).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore EzOdata.slnx
      - run: dotnet build EzOdata.slnx -c Release --no-restore
      - name: Unit tests
        run: dotnet test tests/EzOdata.UnitTests -c Release --no-build
      # GitHub-hosted ubuntu runners include Docker, so Testcontainers
      # (PostgreSQL / MySQL) runs without any extra service config.
      - name: Integration tests
        run: dotnet test tests/EzOdata.IntegrationTests -c Release --no-build
      - name: Conformance + security suite
        run: dotnet test tests/EzOdata.ConformanceTests -c Release --no-build

  publish:
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Pack embeddable packages
        run: dotnet pack EzOdata.slnx -c Release -o artifacts/nuget
      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.repository_owner }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --source github \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
