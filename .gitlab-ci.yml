# GitLab CI/CD for ez-odata-api
#
# Pipeline: build → test → pack → publish
#   - build/test run on every push and merge request
#   - integration + conformance tests use Docker-in-Docker (Testcontainers spins up
#     PostgreSQL / MySQL via the Docker API)
#   - publish pushes the embeddable NuGet packages to this project's GitLab Package
#     Registry, on the default branch and on tags (idempotent via --skip-duplicate)

stages:
  - build
  - test
  - pack
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

default:
  image: mcr.microsoft.com/dotnet/sdk:10.0
  cache:
    key:
      files:
        - Directory.Build.props
    paths:
      - .nuget/packages/

# ---------- build ----------
build:
  stage: build
  script:
    - dotnet restore EzOdata.slnx
    - dotnet build EzOdata.slnx -c Release --no-restore
  artifacts:
    paths:
      - "**/bin/Release/"
      - "**/obj/"
    expire_in: 1 hour

# ---------- test ----------
# Fast, no external services.
unit-tests:
  stage: test
  needs: ["build"]
  script:
    - dotnet test tests/EzOdata.UnitTests -c Release --no-build
      --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/unit.xml"
  artifacts:
    when: always
    reports:
      junit: test-results/unit.xml

# Integration + conformance need a Docker daemon for Testcontainers.
integration-tests:
  stage: test
  needs: ["build"]
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
    TESTCONTAINERS_RYUK_DISABLED: "true"
  script:
    - dotnet test tests/EzOdata.IntegrationTests -c Release --no-build
      --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/integration.xml"
    - dotnet test tests/EzOdata.ConformanceTests -c Release --no-build
      --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results/conformance.xml"
  artifacts:
    when: always
    reports:
      junit: test-results/*.xml

# ---------- pack ----------
# Only the embeddable surface is IsPackable=true (see Directory.Build.props),
# so packing the solution yields exactly the publishable NuGet packages.
pack:
  stage: pack
  needs: ["unit-tests", "integration-tests"]
  script:
    - dotnet pack EzOdata.slnx -c Release --no-build -o "$CI_PROJECT_DIR/artifacts/nuget"
  artifacts:
    paths:
      - artifacts/nuget/*.nupkg
    expire_in: 1 week

# ---------- publish ----------
# Pushes to the project's GitLab NuGet registry using the CI job token.
# Runs on the default branch and on tags only.
publish-nuget:
  stage: publish
  needs: ["pack"]
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - dotnet nuget add source "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/nuget/index.json"
      --name gitlab
      --username gitlab-ci-token
      --password "${CI_JOB_TOKEN}"
      --store-password-in-clear-text
    - dotnet nuget push "artifacts/nuget/*.nupkg"
      --source gitlab
      --api-key "${CI_JOB_TOKEN}"
      --skip-duplicate
